# ═══════════════════════════════════════════════════════════════════
# STSS Deploy — Docker Compose
#
# Orchestrates the Nginx gateway, Auth Service, Info Service,
# business services (schedule / course-selection / forum /
# online-test / grade), a one-shot seed service, and placeholder
# stubs for services not yet implemented.
#
# Gateway image is pulled from GitHub Container Registry (GHCR).
# The gateway is built and published from a separate repository:
#   https://github.com/au12321ua/STSS-gateway
#
# Usage:
#   docker compose up -d                   # start everything
#   docker compose --profile seed up seed schedule_seed  # one-time data seeding
#   docker compose logs -f gateway         # tail gateway logs
#   docker compose --profile dev up        # include SPA dev server
#   docker compose --profile backend-placeholders up -d  # stub services
# ═══════════════════════════════════════════════════════════════════
services:
  # ── Front-end (production) ────────────────────────────────────────
  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/au12321ua/stss-frontend:latest}
    container_name: stss-frontend
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - stss-net
    healthcheck:
      test:     ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 5s

  # ── Front-end (dev) ─────────────────────────────────────────────
  frontend-dev:
    image: node:22-alpine
    container_name: stss-frontend-dev
    profiles: ["dev"]
    working_dir: /app
    command: npx vite --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    volumes:
      - ${FRONTEND_PATH:-./frontend}:/app
    networks:
      - stss-net

  # ── Gateway ────────────────────────────────────────────────────
  gateway:
    image: ${GATEWAY_IMAGE:-ghcr.io/au12321ua/stss-gateway:c3585b4}
    container_name: stss-gateway
    ports:
      - "${GATEWAY_PORT:-8000}:${GATEWAY_PORT:-8000}"
    environment:
      AUTH_SERVICE_URL:      "${AUTH_SERVICE_URL:-auth_service:8001}"
      INFO_SERVICE_URL:      "${INFO_SERVICE_URL:-info_service:8002}"
      SCHEDULE_SERVICE_URL:  "${SCHEDULE_SERVICE_URL:-schedule_service:8003}"
      COURSE_SELECTION_SERVICE_URL: "${COURSE_SELECTION_SERVICE_URL:-course-selection-api:8004}"
      FORUM_SERVICE_URL:     "${FORUM_SERVICE_URL:-forum_service:8005}"
      ONLINE_TEST_SERVICE_URL: "${ONLINE_TEST_SERVICE_URL:-online_test_service:8006}"
      GRADE_SERVICE_URL:     "${GRADE_SERVICE_URL:-grade_service:8007}"
      FRONTEND_URL:          "${FRONTEND_URL:-frontend:80}"
      GATEWAY_PORT:          "${GATEWAY_PORT:-8000}"
      CORS_ORIGINS:          "${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}"
      RATE_LIMIT_LOGIN:      "${RATE_LIMIT_LOGIN:-10r/m}"
      GATEWAY_CLIENT_ID:     "${GATEWAY_CLIENT_ID:-gateway}"
      GATEWAY_CLIENT_SECRET: "${GATEWAY_CLIENT_SECRET:-change-me-gateway-secret}"
    depends_on:
      auth_service:
        condition: service_healthy
      info_service:
        condition: service_healthy
      schedule_service:
        condition: service_healthy
      course-selection-api:
        condition: service_healthy
      forum_service:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - stss-net
    healthcheck:
      test:     ["CMD-SHELL", "curl -fsS http://localhost:$${GATEWAY_PORT:-8000}/api/v1/health || exit 1"]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 10s

  # ── Auth Service ───────────────────────────────────────────────
  auth_service:
    image: ${AUTH_SERVICE_IMAGE:-ghcr.io/au12321ua/stss-auth:latest}
    container_name: stss-auth
    ports:
      - "8001:8001"
    environment:
      # Runtime
      ENV:              "${ENV:-development}"
      LOG_LEVEL:        "${LOG_LEVEL:-DEBUG}"

      # JWT — shared secret, must match across auth & info services
      TOKEN_SECRET_KEY: "${TOKEN_SECRET_KEY:-change-me-in-production}"

      # Databases (SQLite on named volumes)
      AUTH_DATABASE_URL:  "sqlite+aiosqlite:///./data/auth.db"
      AUDIT_DATABASE_URL: "sqlite+aiosqlite:////app/data/audit.db"

      # Gateway service client — MUST match GATEWAY_CLIENT_* vars above
      SERVICE_CLIENT_GATEWAY_ID:       "${GATEWAY_CLIENT_ID:-gateway}"
      SERVICE_CLIENT_GATEWAY_SECRET:   "${GATEWAY_CLIENT_SECRET:-change-me-gateway-secret}"
      SERVICE_CLIENT_GATEWAY_SCOPE:    "internal:verify"
      SERVICE_CLIENT_GATEWAY_AUDIENCE: "gateway"

      # Info Service client — credentials that Info Service uses to call /auth/sys/login
      SERVICE_CLIENT_INFO_SERVICE_ID:       "info_service"
      SERVICE_CLIENT_INFO_SERVICE_SECRET:   "${INFO_SERVICE_CLIENT_SECRET:-change-me-service-secret}"
      SERVICE_CLIENT_INFO_SERVICE_SCOPE:    "user:read course:read calendar:read"
      SERVICE_CLIENT_INFO_SERVICE_AUDIENCE: "info_service"

      # Schedule Service client — worker calls Info through Gateway with this service token
      SERVICE_CLIENT_SCHEDULE_SERVICE_ID:       "${SCHEDULE_SERVICE_CLIENT_ID:-schedule_service}"
      SERVICE_CLIENT_SCHEDULE_SERVICE_SECRET:   "${SCHEDULE_SERVICE_CLIENT_SECRET:-change-me-schedule-service-secret}"
      SERVICE_CLIENT_SCHEDULE_SERVICE_SCOPE:    "offering:read course:read"
      SERVICE_CLIENT_SCHEDULE_SERVICE_AUDIENCE: "schedule_service"

      # Course Selection Service client — calls Info/Schedule with a service token.
      # Latest Auth resolves service-token permissions from DB role SERVICE;
      # SERVICE_CLIENT_*_SCOPE is ignored, so do not configure scopes here.
      SERVICE_CLIENT_COURSE_SELECTION_SERVICE_ID:       "${COURSE_SELECTION_SERVICE_CLIENT_ID:-course_selection_service}"
      SERVICE_CLIENT_COURSE_SELECTION_SERVICE_SECRET:   "${COURSE_SELECTION_SERVICE_CLIENT_SECRET:-change-me-course-selection-service-secret}"
      SERVICE_CLIENT_COURSE_SELECTION_SERVICE_AUDIENCE: "course_selection_service"
    volumes:
      - auth_data:/app/auth_service/data
      - audit_data:/app/data
    restart: unless-stopped
    networks:
      - stss-net
    healthcheck:
      test:     ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/v1/health')"]
      interval: 15s
      timeout:  3s
      retries:  5
      start_period: 10s

  # ── Info Service ───────────────────────────────────────────────
  info_service:
    image: ${INFO_SERVICE_IMAGE:-ghcr.io/au12321ua/stss-info:latest}
    container_name: stss-info
    ports:
      - "8002:8002"
    environment:
      # Runtime
      ENV:              "${ENV:-development}"
      LOG_LEVEL:        "${LOG_LEVEL:-DEBUG}"

      # JWT — shared secret, must match auth_service
      TOKEN_SECRET_KEY: "${TOKEN_SECRET_KEY:-change-me-in-production}"

      # Databases (SQLite on named volumes)
      INFO_DATABASE_URL:  "sqlite+aiosqlite:///./data/info.db"
      AUDIT_DATABASE_URL: "sqlite+aiosqlite:////app/data/audit.db"

      # Auth Service — cross-service calls (Docker internal hostname)
      AUTH_SERVICE_URL:    "http://auth_service:8001"
      AUTH_SERVICE_TIMEOUT: "10"

      # Info Service's own credentials for calling /auth/sys/login
      AUTH_SERVICE_CLIENT_ID:     "info_service"
      AUTH_SERVICE_CLIENT_SECRET: "${INFO_SERVICE_CLIENT_SECRET:-change-me-service-secret}"

      # File uploads (on named volume)
      UPLOAD_DIR:           "/app/info_service/uploads"
      MAX_UPLOAD_SIZE_MB:   "10"
      ALLOWED_UPLOAD_TYPES: "jpg,jpeg,png,pdf,csv"
    volumes:
      - info_data:/app/info_service/data
      - uploads:/app/info_service/uploads
      - audit_data:/app/data
    restart: unless-stopped
    networks:
      - stss-net
    depends_on:
      auth_service:
        condition: service_healthy
    healthcheck:
      test:     ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/api/v1/info/health')"]
      interval: 15s
      timeout:  3s
      retries:  5
      start_period: 10s

  # ── Seed — one-shot data initializer ───────────────────────────
  # Runs once to populate roles, permissions, and default admin user.
  # Idempotent — safe to re-run on existing volumes.
  # Usage: docker compose --profile seed up seed
  seed:
    image: ${SEED_IMAGE:-ghcr.io/au12321ua/stss-seed:latest}
    container_name: stss-seed
    profiles: ["seed"]
    environment:
      TOKEN_SECRET_KEY:  "${TOKEN_SECRET_KEY:-change-me-in-production}"
      AUTH_DATABASE_URL: "sqlite+aiosqlite:////app/auth_service/data/auth.db"
      INFO_DATABASE_URL: "sqlite+aiosqlite:////app/info_service/data/info.db"
      AUDIT_DATABASE_URL: "sqlite+aiosqlite:////app/data/audit.db"
      AUTH_SERVICE_URL:  "http://auth_service:8001"
    volumes:
      - auth_data:/app/auth_service/data
      - info_data:/app/info_service/data
      - audit_data:/app/data
    depends_on:
      auth_service:
        condition: service_healthy
      info_service:
        condition: service_healthy
    networks:
      - stss-net

  schedule_seed:
    image: ${SCHEDULE_IMAGE:-ghcr.io/uppi7/zjuse-schedule:latest}
    container_name: stss-schedule-seed
    profiles: ["seed"]
    command: ["python", "-m", "scripts.seed_integration"]
    environment:
      MYSQL_HOST: schedule_mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: "${SCHEDULE_MYSQL_PASSWORD:-rootpassword}"
      MYSQL_DB: "${SCHEDULE_MYSQL_DB:-course_arrange}"
      REDIS_HOST: schedule_redis
      REDIS_PORT: "6379"
    depends_on:
      schedule_mysql:
        condition: service_healthy
    networks:
      - stss-net

  # ── Schedule Service ───────────────────────────────────────────
  schedule_service:
    image: ${SCHEDULE_IMAGE:-ghcr.io/uppi7/zjuse-schedule:latest}
    container_name: stss-schedule-api
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8003"]
    environment:
      MYSQL_HOST: schedule_mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: "${SCHEDULE_MYSQL_PASSWORD:-rootpassword}"
      MYSQL_DB: "${SCHEDULE_MYSQL_DB:-course_arrange}"
      REDIS_HOST: schedule_redis
      REDIS_PORT: "6379"
      GATEWAY_BASE_URL: "http://gateway:${GATEWAY_PORT:-8000}"
      SCHEDULE_SERVICE_CLIENT_ID: "${SCHEDULE_SERVICE_CLIENT_ID:-schedule_service}"
      SCHEDULE_SERVICE_CLIENT_SECRET: "${SCHEDULE_SERVICE_CLIENT_SECRET:-change-me-schedule-service-secret}"
      ALLOW_UPSTREAM_STUB_FALLBACK: "false"
    depends_on:
      schedule_mysql:
        condition: service_healthy
      schedule_redis:
        condition: service_healthy
    expose:
      - "8003"
    restart: unless-stopped
    networks:
      - stss-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8003/health')\""]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s

  schedule_worker:
    image: ${SCHEDULE_IMAGE:-ghcr.io/uppi7/zjuse-schedule:latest}
    container_name: stss-schedule-worker
    command: ["celery", "-A", "app.tasks.celery_app.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
    environment:
      MYSQL_HOST: schedule_mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: "${SCHEDULE_MYSQL_PASSWORD:-rootpassword}"
      MYSQL_DB: "${SCHEDULE_MYSQL_DB:-course_arrange}"
      REDIS_HOST: schedule_redis
      REDIS_PORT: "6379"
      GATEWAY_BASE_URL: "http://gateway:${GATEWAY_PORT:-8000}"
      SCHEDULE_SERVICE_CLIENT_ID: "${SCHEDULE_SERVICE_CLIENT_ID:-schedule_service}"
      SCHEDULE_SERVICE_CLIENT_SECRET: "${SCHEDULE_SERVICE_CLIENT_SECRET:-change-me-schedule-service-secret}"
      ALLOW_UPSTREAM_STUB_FALLBACK: "false"
    depends_on:
      schedule_service:
        condition: service_healthy
      gateway:
        condition: service_healthy
      schedule_redis:
        condition: service_healthy
      schedule_mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - stss-net

  schedule_mysql:
    image: mysql:8.0
    container_name: stss-schedule-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "${SCHEDULE_MYSQL_PASSWORD:-rootpassword}"
      MYSQL_DATABASE: "${SCHEDULE_MYSQL_DB:-course_arrange}"
    volumes:
      - schedule_mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - stss-net

  schedule_redis:
    image: redis:7-alpine
    container_name: stss-schedule-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - stss-net

  # ── Course Selection Service ───────────────────────────────────
  course-selection-api:
    image: ${COURSE_SELECTION_IMAGE:-ghcr.io/hhhjyz/stss-course-selection:95b523e}
    container_name: stss-course-selection-api
    environment:
      MODE: api
      SERVICE_PORT: "8004"
      SERVICE_NAME: course-selection
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      AUTO_MIGRATE: "true"
      PG_DSN: "postgres://cs_user:${COURSE_SELECTION_PG_PASSWORD:-cs_pwd}@course-selection-pg:5432/${COURSE_SELECTION_PG_DB:-course_selection}"
      REDIS_URL: "redis://course-selection-redis:6379/0"
      RMQ_URL: "amqp://${COURSE_SELECTION_RABBITMQ_USER:-stss}:${COURSE_SELECTION_RABBITMQ_PASSWORD:-stss}@rabbitmq:5672/"
      INFO_SERVICE_BASE_URL: "http://gateway:${GATEWAY_PORT:-8000}"
      SCHEDULE_SERVICE_BASE_URL: "http://gateway:${GATEWAY_PORT:-8000}"
      AUTH_SERVICE_BASE_URL: "http://auth_service:8001"
      COURSE_SELECTION_SERVICE_CLIENT_ID: "${COURSE_SELECTION_SERVICE_CLIENT_ID:-course_selection_service}"
      COURSE_SELECTION_SERVICE_CLIENT_SECRET: "${COURSE_SELECTION_SERVICE_CLIENT_SECRET:-change-me-course-selection-service-secret}"
      DEV_CORS_ORIGIN_REGEX: ""
    depends_on:
      auth_service:
        condition: service_healthy
      info_service:
        condition: service_healthy
      schedule_service:
        condition: service_healthy
      course-selection-pg:
        condition: service_healthy
      course-selection-redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    expose:
      - "8004"
    restart: unless-stopped
    networks:
      - stss-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8004/api/v1/health')\""]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 20s

  course-selection-worker:
    image: ${COURSE_SELECTION_IMAGE:-ghcr.io/hhhjyz/stss-course-selection:95b523e}
    container_name: stss-course-selection-worker
    environment:
      MODE: worker
      SERVICE_NAME: course-selection
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      AUTO_MIGRATE: "true"
      PG_DSN: "postgres://cs_user:${COURSE_SELECTION_PG_PASSWORD:-cs_pwd}@course-selection-pg:5432/${COURSE_SELECTION_PG_DB:-course_selection}"
      REDIS_URL: "redis://course-selection-redis:6379/0"
      RMQ_URL: "amqp://${COURSE_SELECTION_RABBITMQ_USER:-stss}:${COURSE_SELECTION_RABBITMQ_PASSWORD:-stss}@rabbitmq:5672/"
      INFO_SERVICE_BASE_URL: "http://gateway:${GATEWAY_PORT:-8000}"
      SCHEDULE_SERVICE_BASE_URL: "http://gateway:${GATEWAY_PORT:-8000}"
      AUTH_SERVICE_BASE_URL: "http://auth_service:8001"
      COURSE_SELECTION_SERVICE_CLIENT_ID: "${COURSE_SELECTION_SERVICE_CLIENT_ID:-course_selection_service}"
      COURSE_SELECTION_SERVICE_CLIENT_SECRET: "${COURSE_SELECTION_SERVICE_CLIENT_SECRET:-change-me-course-selection-service-secret}"
      DEV_CORS_ORIGIN_REGEX: ""
    depends_on:
      course-selection-api:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - stss-net

  course-selection-pg:
    image: postgres:16-alpine
    container_name: stss-course-selection-pg
    environment:
      POSTGRES_USER: cs_user
      POSTGRES_PASSWORD: "${COURSE_SELECTION_PG_PASSWORD:-cs_pwd}"
      POSTGRES_DB: "${COURSE_SELECTION_PG_DB:-course_selection}"
    volumes:
      - course_selection_pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cs_user -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - stss-net

  course-selection-redis:
    image: redis:7-alpine
    container_name: stss-course-selection-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - course_selection_redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - stss-net

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: stss-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: "${COURSE_SELECTION_RABBITMQ_USER:-stss}"
      RABBITMQ_DEFAULT_PASS: "${COURSE_SELECTION_RABBITMQ_PASSWORD:-stss}"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - stss-net

  # ── Forum Service ──────────────────────────────────────────────
  forum_service:
    image: ${FORUM_IMAGE:-ghcr.io/au12321ua/stss-forum:latest}
    container_name: stss-forum
    environment:
      ENV: "${ENV:-development}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      FORUM_PORT: "8005"
      DATABASE_URL: "sqlite:///./data/forum.db"
      UPLOAD_DIR: "/app/uploads"
      PUBLIC_UPLOAD_PREFIX: "/api/v1/forum/uploads"
      LEGACY_UPLOAD_PREFIX: "/uploads"
      ENABLE_CORS: "false"
      SKIP_EXTERNAL_CHECKS: "${FORUM_SKIP_EXTERNAL_CHECKS:-true}"
      INFO_SERVICE_URL: "http://info_service:8002"
      COURSE_SELECTION_SERVICE_URL: "http://course-selection-api:8004"
      SCORE_SERVICE_URL: "http://grade_service:8007"
      INTERNAL_TOKEN: "${FORUM_INTERNAL_TOKEN:-dev-internal-token}"
    volumes:
      - forum_data:/app/data
      - forum_uploads:/app/uploads
    expose:
      - "8005"
    restart: unless-stopped
    networks:
      - stss-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8005/api/v1/health')\""]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ── Online Testing ──────────────────────────────────────────────────────────
  # STSS Online Testing: based on https://github.com/cpmores/WisdomWeb
  # images below are uploaded to hub.docker.com

  online_test_mysql:
    image: docker.m.daocloud.io/library/mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: stss_testing
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - online_test_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - stss-net

  online_test_redis:
    image: docker.m.daocloud.io/library/redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - stss-net

  online_test_logger:
    image: cpmores/stss_online_testing_logger:v1.0
    restart: unless-stopped
    ports:
      - "50051:50051"
    volumes:
      - online_test_logger_logs:/log/ot
    networks:
      - stss-net

  online_test_service:
    image: cpmores/stss_online_testing_service:v1.0
    restart: unless-stopped
    depends_on:
      online_test_mysql:
        condition: service_healthy
      online_test_redis:
        condition: service_healthy
      online_test_logger:
        condition: service_started
    environment:
      SERVER_PORT: 8006
      MYSQL_HOST: online_test_mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: stss_testing
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_TIMEZONE: Asia/Shanghai
      REDIS_HOST: online_test_redis
      REDIS_PORT: 6379
      LOGGER_GRPC_HOST: online_test_logger
      LOGGER_GRPC_PORT: 50051
      PROCTOR_GRPC_PORT: 50080
      PROCTOR_GRPC_ENABLED: "true"
      PROCTOR_CONTROLLER_ENABLED: "true"
      PROCTOR_CONTROLLER_URL: http://online_test_proctor_controller:8081
      PROCTOR_REDIS_ENABLED: "true"
    expose:
      - "8006"
      - "50080"
    networks:
      - stss-net

  online_test_proctor_controller:
    image: cpmores/stss_online_testing_controller:v1.0
    restart: unless-stopped
    depends_on:
      online_test_redis:
        condition: service_healthy
      online_test_service:
        condition: service_started
      online_test_logger:
        condition: service_started
    environment:
      REDIS_ADDR: online_test_redis:6379
      JAVA_ADDR: online_test_service:50080
      LOGGER_ADDR: online_test_logger:50051
      PROCTOR_IMAGE: cpmores/stss_online_testing_proctor:v1.0
      PROCTOR_NETWORK: stss-net
      PROCTOR_PUBLIC_HOST: localhost
      PROCTOR_WS_SCHEME: ws
      CONTROLLER_PORT: 8081
    ports:
      - "8081:8081"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - stss-net

  # ── Grade ──────────────────────────────────────────────────────────

  grade_service:
    image: ghcr.io/sicrete/stss-grade:latest
    container_name: stss-grade
    expose:
      - "8007"
    environment:
      DATABASE_URL: "sqlite:///./grade.db"
      BASE_INFO_API_URL: "http://info_service:8002"
      COURSE_API_URL: "http://course-selection-api:8004"
      EXAM_API_URL: "http://online_test_service:8006"
      FORUM_API_URL: "http://forum_service:8005"
      GRADE_DEV_MOCK_EXTERNAL: "${GRADE_DEV_MOCK_EXTERNAL:-true}"
    volumes:
      - grade_data:/app/data
    networks:
      - stss-net
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8007/api/v1/health')"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s

networks:
  stss-net:
    name: stss-net
    driver: bridge

volumes:
  auth_data:
  info_data:
  uploads:
  audit_data:
  schedule_mysql_data:
  course_selection_pg_data:
  course_selection_redis_data:
  rabbitmq_data:
  forum_data:
  forum_uploads:
  grade_data:
  online_test_mysql_data:
  online_test_logger_logs:

